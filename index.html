<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="theme-color" content="#D8CBB6"/>
<title>Green Radius Game</title>
<meta name="description" content="A self-ranking sustainability game for Burning Man theme camps. Spin the wheel, answer Yes/No, build your camp's green radius."/>

<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%232a2620'/%3E%3Cpath d='M3 16a13 13 0 1 1 26 0z' fill='%237AB85C'/%3E%3Ccircle cx='16' cy='16' r='4' fill='%232a2620'/%3E%3C/svg%3E"/>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet"/>

<style>
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Space Grotesk', 'Inter', system-ui, -apple-system, sans-serif;
    background: #D8CBB6;
    color: #2a2620;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    min-height: 100vh;
    min-height: 100dvh;
  }
  * { box-sizing: border-box; }
  button { font-family: inherit; }
  input, select { font-family: inherit; }
  input:focus-visible, select:focus-visible {
    outline: 2px solid #7AB85C;
    outline-offset: 1px;
  }
  button:focus-visible {
    outline: 2px solid #7AB85C;
    outline-offset: 2px;
  }

  @keyframes qm-fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes qm-up   { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @media (prefers-reduced-motion: reduce) {
    @keyframes qm-fade { from { opacity: 1; } to { opacity: 1; } }
    @keyframes qm-up   { from { opacity: 1; transform: none; } to { opacity: 1; transform: none; } }
  }

  /* Responsive shell: full-bleed on mobile, phone-shaped frame on larger screens. */
  .grg-shell {
    width: 100%;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: stretch;
    justify-content: center;
    background: #D8CBB6;
  }
  .grg-frame {
    width: 100%;
    max-width: 480px;
    background: #ede9e0;
    position: relative;
    overflow-x: hidden;
    padding-bottom: env(safe-area-inset-bottom);
  }
  @media (min-width: 600px) {
    .grg-shell {
      align-items: center;
      padding: 24px;
      background: #C7BBA1;
    }
    .grg-frame {
      max-width: 440px;
      min-height: 880px;
      border-radius: 28px;
      box-shadow: 0 30px 80px -20px rgba(40,30,20,0.35), 0 0 0 1px rgba(40,30,20,0.06);
    }
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script src="game-data.js"></script>
<script type="text/babel" src="green-radius.jsx"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const PALETTE = {
  label: 'Alkali Flat',
  bg: '#ede9e0',
  canvas: '#2a2620',
  card: '#fcfaf4',
  text: '#2a2620',
  heading: '#2a2620',
  hub: '#3a3128',
  hubStroke: '#4a4036',
  accent: '#7AB85C',
  accentDark: '#558040',
};

function App() {
  return (
    <div className="grg-shell">
      <div className="grg-frame">
        <GreenRadiusGame variant="flat-playa" palette={PALETTE}/>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
